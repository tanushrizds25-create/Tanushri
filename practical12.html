<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Practical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MySite</a>
  </div>
</nav>

<!-- Carousel -->
<div id="c" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <!-- Working Image -->
      <img src="https://picsum.photos/1200/300" class="d-block w-100">
    </div>
    <div class="carousel-item">
      <img src="https://picsum.photos/1200/300?2" class="d-block w-100">
    </div>
  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" data-bs-target="#c" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" data-bs-target="#c" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<!-- Card + Grid -->
<div class="container mt-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Card</h5>
        <button class="btn btn-primary">Click</button>
      </div>
    </div>
  </div>
</div>

<!-- Button -->
<div class="text-center mt-3">
  <button class="btn btn-success">OK</button>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-2 mt-4">
  <p>Footer</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
