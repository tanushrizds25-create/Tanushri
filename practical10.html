<!DOCTYPE html>
<html>
<head>
    <title>Iframe Demo</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            display: flex;
        }
        .menu {
            width: 25%;
            background: #f4f4f4;
            padding: 15px;
        }
        .menu a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: black;
            padding: 8px;
            border-radius: 5px;
        }
        .menu a:hover {
            background-color: #4CAF50;
            color: white;
        }
        .content {
            width: 75%;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: none;
        }
        .map {
            width: 100%;
            height: 400px;
        }
    </style>
</head>

<body>

<header>
    <h1>Iframe Webpage Demo</h1>
</header>

<div class="container">

    <!-- Menu -->
    <div class="menu">
        <h3>Menu</h3>
        <a href="https://example.com" target="frame">Example</a>
        <a href="https://info.cern.ch" target="frame">First Website</a>
    </div>

    <!-- Iframe -->
    <div class="content">
        <iframe name="frame" srcdoc="
            <h2 style='text-align:center;'>Welcome 👋</h2>
            <p style='text-align:center;'>Click any link from the menu to load a webpage here.</p>
        "></iframe>
    </div>

</div>

<hr>

<h2 style="text-align:center;">Our Location</h2>

<!-- Map -->
<iframe
    class="map"
    src="https://www.google.com/maps?q=Nagpur&output=embed">
</iframe>

</body>
</html>
